spring:
  application:
    name: kompot
  datasource:
    url: jdbc:postgresql://localhost:5432/kompot
    username: postgres
    password: Aleajda2307
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: false

server:
  port: 8080

jwt:
  secret: your-secret-key-change-in-production-min-256-bits
  expiration: 86400000
  refresh-expiration: 604800000

logging:
  level:
    com.edu.kompot: DEBUG
    org.springframework.security: DEBUG

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

